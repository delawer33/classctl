<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>classctl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      background: #f4f4f4;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 15px;
      flex-shrink: 0;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar — classroom list */
    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 12px 14px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888;
      font-weight: 600;
    }

    #classroom-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
    }

    #classroom-list li {
      padding: 9px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }

    #classroom-list li:hover { background: #f5f5f5; }
    #classroom-list li.active {
      background: #f0f4ff;
      border-left-color: #4a6cf7;
      font-weight: 500;
    }

    .sidebar-add {
      padding: 10px 14px;
      border-top: 1px solid #eee;
    }

    /* Main panel */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .empty-state {
      color: #999;
      margin-top: 60px;
      text-align: center;
    }

    /* Form */
    .form-section { margin-bottom: 28px; }

    .form-section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      max-width: 420px;
      padding: 7px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #1a1a1a;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4a6cf7;
    }

    .step-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 12px;
      align-items: center;
      max-width: 420px;
    }

    .step-label {
      font-size: 12px;
      color: #555;
      font-weight: 500;
    }

    /* Buttons */
    .btn {
      padding: 7px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .btn-primary { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
    .btn-primary:hover { background: #3a5ce5; }
    .btn-secondary { background: #fff; color: #333; border-color: #d0d0d0; }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-danger { background: #fff; color: #c0392b; border-color: #e0a0a0; }
    .btn-danger:hover { background: #fdf0f0; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .btn-row { display: flex; gap: 8px; margin-top: 20px; }

    /* Messages */
    .msg { font-size: 12px; margin-top: 8px; }
    .msg-ok { color: #27ae60; }
    .msg-err { color: #c0392b; }
    .field-err { font-size: 11px; color: #c0392b; margin-top: 3px; min-height: 14px; }

    /* ── Run Monitor ───────────────────────────────────────── */

    .run-panel { margin-top: 32px; }

    /* Step tracker */
    .step-track {
      display: flex;
      gap: 0;
      align-items: center;
      margin-bottom: 24px;
    }
    .step-bubble {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      background: #eee; color: #888;
      border: 2px solid #ddd;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .step-bubble.active  { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
    .step-bubble.done    { background: #27ae60; color: #fff; border-color: #27ae60; }
    .step-connector {
      flex: 1; height: 2px; background: #ddd; min-width: 12px; max-width: 40px;
    }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      letter-spacing: 0.03em;
    }
    .badge-PENDING     { background: #f0f0f0; color: #888; }
    .badge-RUNNING     { background: #e8eeff; color: #4a6cf7; }
    .badge-CLEAN       { background: #e6f9ee; color: #27ae60; }
    .badge-FLAGGED     { background: #fff4e5; color: #e67e22; }
    .badge-TIMED_OUT   { background: #fdecea; color: #c0392b; }
    .badge-DISCONNECTED{ background: #fdecea; color: #c0392b; }
    .badge-SKIPPED     { background: #f5f5f5; color: #aaa; }

    /* Machine run table */
    .run-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .run-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      text-align: left;
      padding: 6px 8px;
      font-weight: 600;
    }
    .run-table td { padding: 7px 8px; border-top: 1px solid #f0f0f0; vertical-align: top; }
    .run-table tr:first-child td { border-top: none; }

    .output-toggle {
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 13px; padding: 0 4px;
    }
    .output-toggle:hover { color: #555; }

    .output-pre {
      display: none;
      font-family: monospace;
      font-size: 11px;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 3px;
      padding: 8px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #333;
      margin-top: 6px;
    }

    /* Pause overlay */
    .pause-banner {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .pause-banner span { font-weight: 500; font-size: 13px; flex: 1; min-width: 150px; }
    .btn-warn { background: #fff; color: #e67e22; border-color: #f0c060; }
    .btn-warn:hover { background: #fff8e1; }
  </style>
</head>
<body>
  <header style="display:flex;justify-content:space-between;align-items:center">
    <span>classctl</span>
    <button class="btn btn-secondary btn-sm" onclick="showSettings()">Настройки</button>
  </header>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">Классы</div>
      <ul id="classroom-list"></ul>
      <div class="sidebar-add">
        <button class="btn btn-secondary btn-sm" onclick="showNewForm()">+ Новый</button>
      </div>
    </aside>
    <main class="main" id="main">
      <div class="empty-state" id="empty">Выберите класс или создайте новый.</div>
    </main>
  </div>

  <script>
    // Step numbers and human-readable labels in fixed order
    const STEPS = [
      [1, "Остановить ВМ"],
      [2, "Удалить ВМ"],
      [3, "Сбросить хост"],
      [4, "Создать ВМ"],
      [5, "Выключение (опц.)"],
    ];

    let classrooms = [];
    let activeRoom = null;

    async function api(method, path, body) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const r = await fetch(path, opts);
      if (r.status === 204) return null;
      return r;
    }

    async function loadClassrooms() {
      const r = await api("GET", "/classrooms");
      classrooms = await r.json();
      renderList();
      return classrooms;
    }

    function renderList() {
      const ul = document.getElementById("classroom-list");
      ul.innerHTML = classrooms.map(c =>
        `<li class="${c.name === activeRoom ? 'active' : ''}"
             onclick="selectRoom('${escHtml(c.name)}')">${escHtml(c.name)}</li>`
      ).join("");
    }

    function selectRoom(name) {
      activeRoom = name;
      renderList();
      const room = classrooms.find(c => c.name === name);
      renderForm(room, false);
    }

    function showNewForm() {
      activeRoom = null;
      renderList();
      renderForm(null, true);
    }

    function renderForm(room, isNew) {
      const main = document.getElementById("main");
      const sm = room?.step_mapping ?? {};

      const stepFields = STEPS.map(([n, label]) =>
        `<span class="step-label">${label}</span>
         <input type="text" id="step-${n}" value="${escHtml(sm[n] ?? '')}" placeholder="filename.sh">`
      ).join("");

      // Stale machine list warning — shown above Run config when list is old or absent
      const staleBanner = (() => {
        if (isNew) return "";
        const updatedAt = room?.machines_updated_at;
        const stale = !updatedAt || (Date.now() - new Date(updatedAt).getTime()) > 12 * 3600000;
        if (!stale) return "";
        const msg = updatedAt
          ? "Список машин обновлялся более 12 часов назад."
          : "Список машин ещё не обновлялся.";
        return `<div style="padding:8px 12px;background:#fffbe6;border:1px solid #ffe082;border-radius:4px;font-size:12px;color:#7a5c00;margin-bottom:12px">⚠ ${msg} Рекомендуется запустить обнаружение перед запуском.</div>`;
      })();

      main.innerHTML = `
        <div class="form-section">
          <h2>${isNew ? "Новый класс" : "Редактировать класс"}</h2>
          <div class="field">
            <label>Название</label>
            <input type="text" id="f-name" value="${escHtml(room?.name ?? '')}" ${!isNew ? 'readonly style="background:#f8f8f8"' : ''}>
            <div class="field-err" id="err-name"></div>
          </div>
          <div class="field">
            <label>Подсеть (CIDR)</label>
            <input type="text" id="f-subnet" value="${escHtml(room?.subnet ?? '')}" placeholder="192.168.10.0/24">
            <div class="field-err" id="err-subnet"></div>
          </div>
          <div class="field">
            <label>Путь к SSH-ключу</label>
            <input type="text" id="f-key" value="${escHtml(room?.ssh_key_path ?? '')}" placeholder="/home/user/.ssh/id_rsa">
            <div class="field-err" id="err-key"></div>
          </div>
          <div class="field">
            <label>Пользователь SSH</label>
            <input type="text" id="f-username" value="${escHtml(room?.username ?? '')}" placeholder="student (по умолчанию)">
          </div>
          <div class="field">
            <label>Каталог скриптов</label>
            <input type="text" id="f-dir" value="${escHtml(room?.script_directory ?? '/home/student/VBox_install')}">
            <div class="field-err" id="err-dir"></div>
          </div>
          <div class="field">
            <label>Таймаут WoL, с <span style="color:#aaa;font-size:11px">(по умолчанию: 300)</span></label>
            <input type="text" id="f-wol-timeout" value="${escHtml(String(room?.wol_timeout ?? ''))}" placeholder="300" style="max-width:120px">
            <div class="field-err" id="err-wol-timeout"></div>
          </div>
        </div>

        <div class="form-section">
          <h2>Маппинг шагов</h2>
          <div class="step-grid">${stepFields}</div>
          <div class="field-err" id="err-steps" style="margin-top:6px"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveRoom(${isNew})">
            ${isNew ? "Создать" : "Сохранить"}
          </button>
          ${!isNew ? `<button class="btn btn-danger" onclick="deleteRoom()">Удалить</button>` : ""}
        </div>
        <div class="msg" id="form-msg"></div>

        ${!isNew ? `
        <div id="run-monitor"></div>

        <details id="config-accordion" ${(activeRunId && activeRunRoom === room?.name) ? "" : "open"}
                 ontoggle="const a=document.getElementById('accordion-arrow');if(a)a.textContent=this.open?'▼':'▶'">
        <summary style="cursor:pointer;padding:10px 0 6px;font-size:12px;color:#888;user-select:none;list-style:none;outline:none">
          <span id="accordion-arrow">${(activeRunId && activeRunRoom === room?.name) ? "▶" : "▼"}</span>
          Конфигурация, машины и запуск
        </summary>

        <hr style="border:none;border-top:1px solid #eee;margin:20px 0 28px">
        <div class="form-section">
          <h2>Машины
            <span style="font-weight:400;font-size:12px;margin-left:10px;text-transform:none;letter-spacing:0">
              <button class="btn btn-secondary btn-sm" onclick="selectAllMachines(true)">Выбрать все</button>
              <button class="btn btn-secondary btn-sm" onclick="selectAllMachines(false)">Снять выбор</button>
              <button class="btn btn-secondary btn-sm" onclick="discoverMachines()" id="btn-discover">↻ Обновить</button>
              <button class="btn btn-secondary btn-sm" onclick="showAddMachine()">+ Добавить</button>
            </span>
          </h2>
          <div id="discover-msg" class="msg" style="margin-bottom:8px"></div>
          <div id="machine-list-wrap"></div>
          <div id="add-machine-form" style="display:none;margin-top:12px">
            <div style="display:flex;gap:8px;max-width:420px;flex-wrap:wrap">
              <input type="text" id="new-ip" placeholder="IP-адрес" style="flex:1;min-width:130px">
              <input type="text" id="new-mac" placeholder="MAC-адрес" style="flex:1;min-width:150px">
              <button class="btn btn-primary btn-sm" onclick="addMachine()">Добавить</button>
              <button class="btn btn-secondary btn-sm" onclick="hideAddMachine()">Отмена</button>
            </div>
          </div>
        </div>

        <hr style="border:none;border-top:1px solid #eee;margin:28px 0">
        ${staleBanner}
        <div class="form-section">
          <h2>Запуск пайплайна
            <span style="font-weight:400;font-size:12px;margin-left:10px;text-transform:none;letter-spacing:0">
              Начальный шаг:
              <select id="run-start" style="font-size:12px;border:1px solid #d0d0d0;border-radius:3px;padding:2px 4px">
                ${STEPS.slice(0,-1).map(([n,l]) => `<option value="${n}">${n} — ${l}</option>`).join("")}
              </select>
            </span>
          </h2>
          <label style="display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;cursor:pointer;font-size:13px;font-weight:400;color:#333">
            <input type="checkbox" id="run-wol" checked>
            Wake on LAN
            <span style="color:#aaa;font-size:11px">(снимите, если машины уже включены)</span>
          </label>
          <br>
          <div id="run-confirmation" style="display:none;margin-bottom:12px"></div>
          <button class="btn btn-primary" onclick="startRun()">▶ Запустить</button>
          <div class="msg" id="run-start-msg"></div>
        </div>

        <hr style="border:none;border-top:1px solid #eee;margin:28px 0">
        <div class="form-section">
          <h2>Выключение</h2>
          <label style="display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;cursor:pointer;font-size:13px;font-weight:400;color:#333">
            <input type="checkbox" id="run-shutdown-after">
            Выключить после завершения
            <span style="color:#aaa;font-size:11px">(автоматически при успешном завершении)</span>
          </label>
          <br>
          <button class="btn btn-secondary" onclick="shutdownMachines()">⏻ Выключить выбранные</button>
          <div class="msg" id="shutdown-msg"></div>
          <div id="shutdown-results"></div>
        </div>

        </details>
        ` : ""}
      `;

      if (!isNew) {
        loadMachines(room.name);
        if (activeRunId && activeRunRoom === room.name) {
          restoreRunMonitor();
        }
      }
    }

    async function loadMachines(roomName) {
      const r = await api("GET", `/classrooms/${encodeURIComponent(roomName)}/machines`);
      const machines = await r.json();
      renderMachineList(roomName, machines);
    }

    function renderMachineList(roomName, machines, knownMacs = new Set()) {
      const wrap = document.getElementById("machine-list-wrap");
      if (!wrap) return;
      if (machines.length === 0) {
        wrap.innerHTML = `<p style="color:#999;font-size:12px">Нет машин. Добавьте или запустите обнаружение.</p>`;
        return;
      }
      wrap.innerHTML = `
        <table style="width:100%;max-width:500px;border-collapse:collapse">
          <thead>
            <tr style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em">
              <th style="width:32px;padding:6px 0"></th>
              <th style="text-align:left;padding:6px 8px">IP</th>
              <th style="text-align:left;padding:6px 8px">MAC</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody>
            ${machines.map(m => {
              const isNew = knownMacs.size > 0 && !knownMacs.has(m.mac);
              const rowStyle = isNew ? "border-top:1px solid #f0f0f0;background:#fffbe6" : "border-top:1px solid #f0f0f0";
              const newTag = isNew ? `<span style="font-size:10px;color:#b8860b;margin-left:6px">новая машина</span>` : "";
              return `
              <tr style="${rowStyle}">
                <td style="padding:6px 0;text-align:center">
                  <input type="checkbox" class="machine-cb" data-mac="${escHtml(m.mac)}" checked>
                </td>
                <td style="padding:6px 8px;font-family:monospace;font-size:13px">${escHtml(m.ip)}</td>
                <td style="padding:6px 8px;font-family:monospace;font-size:12px;color:#666">${escHtml(m.mac)}${newTag}</td>
                <td style="padding:6px 0;text-align:center">
                  <button class="btn btn-secondary btn-sm"
                          onclick="removeMachine('${escHtml(roomName)}','${escHtml(m.mac)}')"
                          title="Удалить">✕</button>
                </td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function selectAllMachines(checked) {
      document.querySelectorAll(".machine-cb").forEach(cb => cb.checked = checked);
    }

    function showAddMachine() {
      const f = document.getElementById("add-machine-form");
      f.style.display = "block";
    }

    function hideAddMachine() {
      document.getElementById("add-machine-form").style.display = "none";
    }

    async function addMachine() {
      const ip = document.getElementById("new-ip").value.trim();
      const mac = document.getElementById("new-mac").value.trim();
      if (!ip || !mac) return;
      await api("POST", `/classrooms/${encodeURIComponent(activeRoom)}/machines`, { ip, mac });
      hideAddMachine();
      await loadMachines(activeRoom);
    }

    async function removeMachine(roomName, mac) {
      await api("DELETE", `/classrooms/${encodeURIComponent(roomName)}/machines/${encodeURIComponent(mac)}`);
      await loadMachines(roomName);
    }

    // MACs present before the last discovery — used to highlight new machines
    let _knownMacsBeforeDiscover = new Set();

    async function discoverMachines() {
      const btn = document.getElementById("btn-discover");
      const msg = document.getElementById("discover-msg");
      if (btn) btn.disabled = true;
      if (msg) { msg.className = "msg"; msg.textContent = "Сканирование…"; }

      // Snapshot MACs and their checked state before re-rendering
      _knownMacsBeforeDiscover = new Set(
        [...document.querySelectorAll(".machine-cb")].map(cb => cb.dataset.mac)
      );
      _uncheckedMacsBeforeDiscover = new Set(
        [...document.querySelectorAll(".machine-cb")]
          .filter(cb => !cb.checked)
          .map(cb => cb.dataset.mac)
      );

      const r = await api("POST", `/classrooms/${encodeURIComponent(activeRoom)}/discover`);

      if (r && r.ok) {
        const body = await r.json();
        const machines = body.machines ?? body;
        renderMachineList(activeRoom, machines, _knownMacsBeforeDiscover);
        // Restore unchecked state for machines that were already known before scan.
        // Newly discovered machines (not in _knownMacsBeforeDiscover) stay checked.
        _uncheckedMacsBeforeDiscover.forEach(mac => {
          if (_knownMacsBeforeDiscover.has(mac)) {
            const cb = document.querySelector(`.machine-cb[data-mac="${CSS.escape(mac)}"]`);
            if (cb) cb.checked = false;
          }
        });
        if (msg) {
          if (body.no_hosts_found) {
            msg.className = "msg msg-err";
            msg.textContent = "Хосты не найдены. Машины выключены или ноутбук подключён не к той подсети.";
          } else {
            msg.className = "msg msg-ok";
            const newInfo = body.new_count > 0 ? `, из них ${body.new_count} новых` : "";
            msg.textContent = `Найдено машин: ${body.found_count}${newInfo}.`;
          }
        }
      } else {
        const err = r ? await r.json() : { detail: "Ошибка сети" };
        if (msg) { msg.className = "msg msg-err"; msg.textContent = err.detail ?? "Ошибка сканирования — проверьте подключение к подсети класса."; }
      }
      if (btn) btn.disabled = false;
    }

    async function saveRoom(isNew) {
      // Clear previous field errors
      document.querySelectorAll(".field-err").forEach(el => el.textContent = "");

      const wolRaw = document.getElementById("f-wol-timeout").value.trim();
      const payload = {
        name: document.getElementById("f-name").value.trim(),
        subnet: document.getElementById("f-subnet").value.trim(),
        ssh_key_path: document.getElementById("f-key").value.trim(),
        username: document.getElementById("f-username").value.trim(),
        script_directory: document.getElementById("f-dir").value.trim(),
        step_mapping: Object.fromEntries(
          STEPS.map(([n]) => [n, document.getElementById(`step-${n}`).value.trim()])
        ),
        machines: [],
      };
      if (wolRaw) payload.wol_timeout = parseInt(wolRaw, 10);

      // Client-side validation
      let hasErrors = false;
      function setFieldErr(id, text) {
        const el = document.getElementById(`err-${id}`);
        if (el) { el.textContent = text; hasErrors = true; }
      }
      if (!payload.name) setFieldErr("name", "Обязательное поле");
      if (!payload.subnet) setFieldErr("subnet", "Обязательное поле");
      if (!payload.ssh_key_path) setFieldErr("key", "Обязательное поле");
      if (!payload.script_directory) setFieldErr("dir", "Обязательное поле");
      if (wolRaw && (!/^\d+$/.test(wolRaw) || parseInt(wolRaw, 10) <= 0)) {
        setFieldErr("wol-timeout", "Введите целое число больше 0");
      }
      const missingSteps = [1, 2, 3, 4].filter(n => !payload.step_mapping[n]);
      if (missingSteps.length > 0) setFieldErr("steps", `Укажите файлы для шагов: ${missingSteps.join(", ")}`);
      if (hasErrors) return;

      const method = isNew ? "POST" : "PUT";
      const path = isNew ? "/classrooms" : `/classrooms/${encodeURIComponent(activeRoom)}`;
      const r = await api(method, path, payload);

      const msg = document.getElementById("form-msg");
      if (r.ok) {
        msg.className = "msg msg-ok";
        msg.textContent = isNew ? "Класс создан." : "Сохранено.";
        await loadClassrooms();
        if (isNew) selectRoom(payload.name);
      } else {
        const err = await r.json();
        msg.className = "msg msg-err";
        msg.textContent = err.detail ?? "Ошибка сохранения.";
      }
    }

    async function deleteRoom() {
      if (!confirm(`Удалить "${activeRoom}"?`)) return;
      await api("DELETE", `/classrooms/${encodeURIComponent(activeRoom)}`);
      activeRoom = null;
      await loadClassrooms();
      document.getElementById("main").innerHTML =
        `<div class="empty-state" id="empty">Выберите класс или создайте новый.</div>`;
    }

    // Prevent XSS when interpolating user data into innerHTML
    function escHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function showSettings() {
      activeRoom = null;
      renderList();
      const r = await api("GET", "/settings/error-patterns");
      const patterns = await r.json();
      const main = document.getElementById("main");
      main.innerHTML = `
        <div class="form-section">
          <h2>Шаблоны обнаружения ошибок</h2>
          <p style="font-size:12px;color:#666;margin-bottom:14px">
            Строки вывода скрипта, содержащие любой из этих фрагментов (без учёта регистра),
            помечаются как ошибки.
          </p>
          <div id="pattern-list">
            ${patterns.map((p, i) => patternRow(p, i)).join("")}

          <button class="btn btn-secondary btn-sm" style="margin-top:10px"

        <div class="msg" id="form-msg"></div>
      `;
    }

    function patternRow(value, i) {
      return `<div style="display:flex;gap:8px;margin-bottom:6px;max-width:300px">
        <input type="text" class="pattern-input" value="${escHtml(value)}" style="flex:1">
        <button class="btn btn-secondary btn-sm" onclick="this.parentElement.remove()">✕</button>
      </div>`;
    }

    function addPatternRow() {
      const list = document.getElementById("pattern-list");
      const div = document.createElement("div");
      div.innerHTML = patternRow("", list.children.length);
      list.appendChild(div.firstElementChild);
    }

    async function savePatterns() {
      const inputs = document.querySelectorAll(".pattern-input");
      const patterns = [...inputs].map(i => i.value.trim()).filter(Boolean);
      const r = await api("PUT", "/settings/error-patterns", patterns);
      const msg = document.getElementById("form-msg");
      msg.className = r.ok ? "msg msg-ok" : "msg msg-err";
      msg.textContent = r.ok ? "Сохранено." : "Ошибка сохранения.";
    }

    // ── Run Monitor ──────────────────────────────────────────────────────────

    let activeRunId = null;
    let activeRunWs = null;
    let activeRunRoom = null;  // classroom name that owns the active run
    // ip → accumulated output text
    const machineOutput = {};
    // ip → last status
    const machineStatus = {};
    // ip → timestamp of last machine_output event (for silent-script heartbeat)
    const lastOutputAt = {};
    // IPs that were part of the most recently started run (for shutdown-after-completion)
    let activeRunMachineIps = [];
    // MACs that were unchecked before the last Discovery refresh
    let _uncheckedMacsBeforeDiscover = new Set();
    // Run config held while the confirmation dialog is shown
    let _pendingRunConfig = null;
    // step elapsed timer state
    let stepStartedAt = null;
    let stepElapsedTimer = null;

    const END_STEP = 4;
    const STATUS_LABELS = {
      PENDING: "ОЖИДАНИЕ", RUNNING: "ВЫПОЛН.", CLEAN: "ОК",
      FLAGGED: "ОШИБКИ", TIMED_OUT: "ТАЙМАУТ", DISCONNECTED: "РАЗРЫВ",
      SKIPPED: "ПРОПУСК",
    };

    function restoreRunMonitor() {
      // Rebuild the monitor DOM from current in-memory state.
      // The WebSocket is still running — no reconnect needed.
      const phase = activeRunWs && activeRunWs.readyState === WebSocket.OPEN
        ? "RUNNING" : "RUNNING";  // best guess; snapshot will correct it shortly
      const machines = {};
      Object.entries(machineStatus).forEach(([ip, s]) => machines[ip] = s);
      // Pull full state from server to get correct phase/step
      api("GET", `/runs/${activeRunId}/state`).then(async r => {
        if (!r || !r.ok) return;
        const state = await r.json();
        if (state.output) Object.assign(machineOutput, state.output);
        Object.entries(state.machines).forEach(([ip, s]) => machineStatus[ip] = s);
        renderRunMonitor(state);
        // Reconnect WS only if it's gone
        if (!activeRunWs || activeRunWs.readyState > WebSocket.OPEN) {
          connectRunWs(activeRunId);
        }
      });
    }

    async function startRun() {
      const msg = document.getElementById("run-start-msg");
      const startStep = parseInt(document.getElementById("run-start")?.value ?? "1");

      const checked = [...document.querySelectorAll(".machine-cb:checked")]
        .map(cb => {
          const row = cb.closest("tr");
          return row?.querySelector("td:nth-child(2)")?.textContent?.trim();
        }).filter(Boolean);

      if (checked.length === 0) {
        msg.className = "msg msg-err";
        msg.textContent = "Выберите хотя бы одну машину.";
        return;
      }

      const wakeOnLan = document.getElementById("run-wol")?.checked ?? true;
      _pendingRunConfig = { startStep, checked, wakeOnLan };
      showRunConfirmation(startStep, checked);
    }

    function showRunConfirmation(startStep, machines) {
      const confirmEl = document.getElementById("run-confirmation");
      if (!confirmEl) return;
      const stepEntry = STEPS.find(([n]) => n === startStep);
      const stepLabel = stepEntry ? stepEntry[1] : `Шаг ${startStep}`;
      confirmEl.style.display = "block";
      confirmEl.innerHTML = `
        <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:14px 18px">
          <div style="font-weight:600;font-size:13px;margin-bottom:8px">Подтвердите запуск</div>
          <div style="font-size:13px;margin-bottom:4px">Начальный шаг: <b>Шаг ${startStep} — ${escHtml(stepLabel)}</b></div>
          <div style="font-size:13px;margin-bottom:10px;color:#555">Машин: <b>${machines.length}</b> — <span style="font-family:monospace;font-size:12px">${machines.map(escHtml).join(", ")}</span></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="confirmAndStartRun()">▶ Подтвердить запуск</button>
            <button class="btn btn-secondary btn-sm" onclick="cancelRunConfirmation()">Отмена</button>
          </div>
        </div>`;
    }

    function cancelRunConfirmation() {
      _pendingRunConfig = null;
      const confirmEl = document.getElementById("run-confirmation");
      if (confirmEl) confirmEl.style.display = "none";
    }

    async function confirmAndStartRun() {
      if (!_pendingRunConfig) return;
      const { startStep, checked, wakeOnLan } = _pendingRunConfig;
      _pendingRunConfig = null;
      cancelRunConfirmation();

      const msg = document.getElementById("run-start-msg");

      if (activeRunWs) { activeRunWs.close(); activeRunWs = null; }

      const r = await api("POST", `/classrooms/${encodeURIComponent(activeRoom)}/run`, {
        start_step: startStep,
        end_step: END_STEP,
        machine_ips: checked,
        wake_on_lan: wakeOnLan,
      });

      if (!r || !r.ok) {
        const err = r ? await r.json() : { detail: "Ошибка сети" };
        msg.className = "msg msg-err";
        msg.textContent = err.detail ?? "Не удалось запустить.";
        return;
      }

      const body = await r.json();
      const { run_id, stale_machines_warning } = body;
      activeRunId = run_id;
      activeRunRoom = activeRoom;
      activeRunMachineIps = checked;
      localStorage.setItem("classctl_run_id", run_id);
      msg.className = "msg msg-ok";
      msg.textContent = `Запуск ${run_id.slice(0, 8)}… начат.`;


      Object.keys(machineOutput).forEach(k => delete machineOutput[k]);
      Object.keys(machineStatus).forEach(k => delete machineStatus[k]);
      Object.keys(lastOutputAt).forEach(k => delete lastOutputAt[k]);

      renderRunMonitor({ phase: "RUNNING", current_step: startStep, start_step: startStep,
                         end_step: END_STEP, machines: Object.fromEntries(checked.map(ip => [ip, "PENDING"])),
                         flagged_lines: {} });

      // Collapse config accordion so the run monitor is visible without scrolling
      const accordion = document.getElementById("config-accordion");
      if (accordion) accordion.removeAttribute("open");
      const arrow = document.getElementById("accordion-arrow");
      if (arrow) arrow.textContent = "▶";

      connectRunWs(run_id);
    }

    async function shutdownMachines() {
      const msg = document.getElementById("shutdown-msg");
      const checked = [...document.querySelectorAll(".machine-cb:checked")]
        .map(cb => {
          const row = cb.closest("tr");
          return row?.querySelector("td:nth-child(2)")?.textContent?.trim();
        }).filter(Boolean);

      if (checked.length === 0) {
        msg.className = "msg msg-err";
        msg.textContent = "Выберите хотя бы одну машину.";
        return;
      }

      if (!confirm(`Выключить ${checked.length} машин?`)) return;

      msg.className = "msg";
      msg.textContent = "Выключение…";
      const resultsEl = document.getElementById("shutdown-results");
      if (resultsEl) resultsEl.innerHTML = "";

      const r = await api("POST", `/classrooms/${encodeURIComponent(activeRoom)}/shutdown`, {
        machine_ips: checked,
      });

      if (!r || !r.ok) {
        const err = r ? await r.json() : { detail: "Ошибка сети" };
        msg.className = "msg msg-err";
        msg.textContent = err.detail ?? "Ошибка выключения.";
        return;
      }

      const data = await r.json();
      const okCount = data.results.filter(x => x.ok).length;
      msg.className = "msg msg-ok";
      msg.textContent = `Команда отправлена: ${okCount} из ${data.results.length} машин.`;

      if (resultsEl) {
        const rows = data.results.map(res =>
          `<div style="font-size:12px;margin-top:3px">
            <span style="font-family:monospace">${escHtml(res.ip)}</span>
            ${res.ok ? '<span style="color:#27ae60"> ✓</span>' : `<span style="color:#c0392b"> ✗ ${escHtml(res.error ?? "")}</span>`}
          </div>`
        ).join("");
        const skipped = (data.skipped ?? []).map(s =>
          `<div style="font-size:12px;margin-top:3px;color:#aaa">
            <span style="font-family:monospace">${escHtml(s.ip)}</span> — пропущено (активный запуск)
          </div>`
        ).join("");
        resultsEl.innerHTML = rows + skipped;
      }
    }

    function connectRunWs(runId, retryDelay = 1000) {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${proto}//${location.host}/runs/${runId}/ws`);
      activeRunWs = ws;

      ws.onmessage = (e) => {
        const event = JSON.parse(e.data);
        if (event.type !== "ping") handleRunEvent(event);
      };

      ws.onclose = () => {
        // Don't reconnect if the run finished cleanly or was aborted
        if (!activeRunId || activeRunId !== runId) return;
        const phase = document.getElementById("run-phase-label")?.textContent ?? "";
        if (phase === "Завершено" || phase === "Прервано") return;

        // Reconnect with exponential backoff (cap at 30s)
        const delay = Math.min(retryDelay, 30000);
        setTimeout(() => {
          if (activeRunId === runId) {
            // Fetch latest state first so output is up to date, then reconnect
            api("GET", `/runs/${runId}/state`).then(async r => {
              if (!r || !r.ok) return;
              const state = await r.json();
              if (state.phase === "COMPLETED" || state.phase === "ABORTED") {
                localStorage.removeItem("classctl_run_id");
                activeRunRoom = null;
                return;
              }
              if (state.output) Object.assign(machineOutput, state.output);
              Object.entries(state.machines).forEach(([ip, s]) => machineStatus[ip] = s);
              renderRunMonitor(state);
              connectRunWs(runId, delay * 2);
            });
          }
        }, delay);
      };

      ws.onerror = () => { /* onclose fires after onerror, handles reconnect */ };
    }

    function handleRunEvent(event) {
      if (event.type === "wol_sent") {
        _renderWolStatus(`WoL-пакеты отправлены — ожидание SSH для ${event.ips.length} машин…`);
        return;
      }
      if (event.type === "wol_polling") {
        _renderWolStatus(`Ожидание SSH… ${event.elapsed_seconds} с`);
        return;
      }
      if (event.type === "wol_result") {
        _clearWolStatus();
        return;
      }
      if (event.type === "snapshot") {
        renderRunMonitor(event.state);
        return;
      }
      if (event.type === "machine_output") {
        machineOutput[event.ip] = (machineOutput[event.ip] ?? "") + event.line;
        lastOutputAt[event.ip] = Date.now();
        const key = event.ip.replace(/\./g, "-");
        const pre = document.getElementById(`out-${key}`);
        if (pre) { pre.textContent = machineOutput[event.ip]; pre.scrollTop = pre.scrollHeight; }
        // Update last-line cell and reset any "no output" heartbeat text
        const lastEl = document.getElementById(`last-${key}`);
        if (lastEl && machineStatus[event.ip] === "RUNNING") {
          const lines = machineOutput[event.ip].trim().split("\n");
          lastEl.textContent = lines[lines.length - 1] ?? "";
        }
        return;
      }
      if (event.type === "machine_update") {
        // Initialise lastOutputAt when a machine starts running so the heartbeat
        // doesn't immediately show "no output" for machines that haven't produced any yet.
        if (event.status === "RUNNING") lastOutputAt[event.ip] = Date.now();
        machineStatus[event.ip] = event.status;
        updateMachineBadge(event.ip, event.status);
        return;
      }
      if (event.type === "step_started") {
        updateStepTracker(event.step, "active");
        startStepTimer(event.step);
        return;
      }
      if (event.type === "run_paused") {
        showPauseBanner(event.step);
        return;
      }
      if (event.type === "run_finished") {
        const roomName = activeRunRoom;
        const runMachines = [...activeRunMachineIps];
        hidePauseBanner();
        updateRunHeader(event.phase);
        stopStepTimer();
        localStorage.removeItem("classctl_run_id");
        activeRunRoom = null;
        // Auto-shutdown when checkbox is checked and run completed cleanly
        if (event.phase === "COMPLETED" && roomName && runMachines.length > 0) {
          const shutdownAfter = document.getElementById("run-shutdown-after");
          if (shutdownAfter?.checked) {
            setTimeout(async () => {
              const r = await api("POST", `/classrooms/${encodeURIComponent(roomName)}/shutdown`, {
                machine_ips: runMachines,
              });
              const shutdownMsg = document.getElementById("shutdown-msg");
              if (shutdownMsg && r?.ok) {
                const data = await r.json();
                const ok = data.results.filter(x => x.ok).length;
                shutdownMsg.className = "msg msg-ok";
                shutdownMsg.textContent = `Автовыключение: ${ok} из ${runMachines.length} машин выключено.`;
              }
            }, 1000);
          }
        }
        return;
      }
    }

    function renderRunMonitor(state) {
      const mon = document.getElementById("run-monitor");
      if (!mon) return;

      // Capture current output/status so re-renders don't lose accumulated data
      const ips = Object.keys(state.machines);
      ips.forEach(ip => {
        if (!machineStatus[ip]) machineStatus[ip] = state.machines[ip];
      });

      const stepBubbles = buildStepTracker(state.start_step, state.end_step, state.current_step, state.phase);
      const rows = ips.map(ip => machineRow(ip, machineStatus[ip] ?? state.machines[ip])).join("");

      mon.innerHTML = `
        <div class="run-panel">
          <div id="pause-banner" style="display:none"></div>
          <div id="run-header" class="form-section">
            <h2 id="run-phase-label">${phaseLabel(state.phase)}
              <span id="step-elapsed" style="font-size:12px;font-weight:400;color:#aaa;margin-left:12px"></span>
            </h2>
          </div>
          <div class="step-track">${stepBubbles}</div>
          <table class="run-table">
            <thead>
              <tr>
                <th style="width:140px">IP</th>
                <th style="width:120px">Статус</th>
                <th>Последний вывод</th>
                <th style="width:32px"></th>
              </tr>
            </thead>
            <tbody id="run-tbody">${rows}</tbody>
          </table>
        </div>
      `;

      if (state.phase === "PAUSED") showPauseBanner(state.current_step);
    }

    function buildStepTracker(startStep, endStep, current, phase) {
      const parts = [];
      for (let s = startStep; s <= endStep; s++) {
        if (s > startStep) parts.push(`<div class="step-connector"></div>`);
        let cls = "";
        if (phase === "COMPLETED" || s < current) cls = "done";
        else if (s === current) cls = "active";
        parts.push(`<div class="step-bubble ${cls}" id="step-bub-${s}">${s}</div>`);
      }
      return parts.join("");
    }

    function machineRow(ip, status) {
      const key = ip.replace(/\./g, "-");
      const lastLine = (machineOutput[ip] ?? "").trim().split("\n").pop() ?? "";
      return `
        <tr id="row-${key}">
          <td style="font-family:monospace">${escHtml(ip)}</td>
          <td><span class="badge badge-${status}" id="badge-${key}">${STATUS_LABELS[status] ?? status}</span></td>
          <td style="font-family:monospace;font-size:12px;color:#555" id="last-${key}">${escHtml(lastLine)}</td>
          <td>
            <button class="output-toggle" onclick="toggleOutput('${key}')" title="Вывод">▼</button>
          </td>
        </tr>
        <tr id="out-row-${key}" style="display:none">
          <td colspan="4" style="padding:0 8px 10px">
            <pre class="output-pre" id="out-${key}" style="display:block;margin:0">${escHtml(machineOutput[ip] ?? "")}</pre>
          </td>
        </tr>`;
    }

    function toggleOutput(key) {
      const row = document.getElementById(`out-row-${key}`);
      if (!row) return;
      row.style.display = row.style.display === "none" ? "table-row" : "none";
    }

    function updateMachineBadge(ip, status) {
      const key = ip.replace(/\./g, "-");
      const badge = document.getElementById(`badge-${key}`);
      if (badge) {
        badge.className = `badge badge-${status}`;
        badge.textContent = STATUS_LABELS[status] ?? status;
      }
      const lastEl = document.getElementById(`last-${key}`);
      if (lastEl) {
        const lastLine = (machineOutput[ip] ?? "").trim().split("\n").pop() ?? "";
        lastEl.textContent = lastLine;
      }
    }

    function updateStepTracker(step, cls) {
      const bub = document.getElementById(`step-bub-${step}`);
      if (bub) { bub.className = `step-bubble ${cls}`; }
      // Mark previous steps as done
      for (let s = 1; s < step; s++) {
        const b = document.getElementById(`step-bub-${s}`);
        if (b && !b.classList.contains("done")) b.className = "step-bubble done";
      }
    }

    function showPauseBanner(step) {
      const banner = document.getElementById("pause-banner");
      if (!banner) return;
      banner.style.display = "flex";
      banner.className = "pause-banner";

      // Build per-category lists from in-memory state
      const flagged = [], timedOut = [], disconnected = [];
      for (const [ip, s] of Object.entries(machineStatus)) {
        if (s === "FLAGGED") flagged.push(ip);
        else if (s === "TIMED_OUT") timedOut.push(ip);
        else if (s === "DISCONNECTED") disconnected.push(ip);
      }
      const total = flagged.length + timedOut.length + disconnected.length;

      // Find the most common last error line among flagged machines
      let commonError = "";
      if (flagged.length) {
        const lastLines = flagged.map(ip => {
          const out = (machineOutput[ip] ?? "").trimEnd();
          return out.split("\n").pop() ?? "";
        }).filter(Boolean);
        if (lastLines.length) {
          const freq = {};
          lastLines.forEach(l => freq[l] = (freq[l] ?? 0) + 1);
          commonError = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
        }
      }

      let summary = `⚠ Остановлено после шага ${step} — ${total} машин требуют действия`;
      if (flagged.length)      summary += `<br><small>ОШИБКИ (${flagged.length}): ${flagged.join(", ")}${commonError ? ` — «${escHtml(commonError.slice(0, 80))}»` : ""}</small>`;
      if (timedOut.length)     summary += `<br><small>ТАЙМАУТ (${timedOut.length}): ${timedOut.join(", ")}</small>`;
      if (disconnected.length) summary += `<br><small>РАЗРЫВ (${disconnected.length}): ${disconnected.join(", ")}</small>`;
      if (disconnected.length) summary += `<br><small style="color:#c0392b;font-weight:500">⚠ Соединение SSH было прервано — скрипт может всё ещё выполняться на этих машинах. Повтор запустит новый экземпляр.</small>`;

      banner.innerHTML = `
        <span style="flex:1;min-width:150px">${summary}</span>
        <button class="btn btn-secondary btn-sm" onclick="sendDecision('retry')">↩ Повтор</button>
        <button class="btn btn-warn btn-sm" onclick="sendDecision('skip')">⟶ Пропустить</button>
        <button class="btn btn-danger btn-sm" onclick="sendDecision('abort')">✕ Прервать</button>
      `;
    }

    function hidePauseBanner() {
      const banner = document.getElementById("pause-banner");
      if (banner) banner.style.display = "none";
    }

    function updateRunHeader(phase) {
      const lbl = document.getElementById("run-phase-label");
      if (lbl) lbl.textContent = phaseLabel(phase);
      // Mark all steps done on completion
      if (phase === "COMPLETED") {
        document.querySelectorAll(".step-bubble").forEach(b => b.className = "step-bubble done");
      }
    }

    function _renderWolStatus(text) {
      let el = document.getElementById("wol-status");
      if (!el) {
        const mon = document.getElementById("run-monitor");
        if (!mon) return;
        el = document.createElement("div");
        el.id = "wol-status";
        el.style.cssText = "padding:10px 14px;background:#f0f4ff;border:1px solid #c7d4fc;border-radius:4px;font-size:13px;margin-bottom:16px;color:#4a6cf7";
        mon.prepend(el);
      }
      el.textContent = text;
    }

    function _clearWolStatus() {
      const el = document.getElementById("wol-status");
      if (el) el.remove();
    }

    function _fmtElapsed(seconds) {
      if (seconds < 60) return `${seconds} с`;
      return `${Math.floor(seconds / 60)} мин ${seconds % 60} с`;
    }

    function startStepTimer(step) {
      stopStepTimer();
      stepStartedAt = Date.now();
      stepElapsedTimer = setInterval(() => {
        const el = document.getElementById("step-elapsed");
        if (el) el.textContent = `Шаг ${step}: ${_fmtElapsed(Math.floor((Date.now() - stepStartedAt) / 1000))}`;
      }, 1000);
    }

    function stopStepTimer() {
      if (stepElapsedTimer) { clearInterval(stepElapsedTimer); stepElapsedTimer = null; }
      const el = document.getElementById("step-elapsed");
      if (el && stepStartedAt) {
        el.textContent = el.textContent.replace(/^(Шаг \d+): /, "$1 завершён за ");
      }
      stepStartedAt = null;
    }

    function phaseLabel(phase) {
      return {
        RUNNING: "Выполняется", PAUSED: "Пауза — ожидание решения",
        COMPLETED: "Завершено", ABORTED: "Прервано",
      }[phase] ?? phase;
    }

    async function sendDecision(action) {
      if (!activeRunId) return;
      if (action === "abort") {
        if (!confirm("Прервать выполнение? Это действие необратимо.")) return;
      }
      hidePauseBanner();
      await api("POST", `/runs/${activeRunId}/decide`, { action });
    }

    // ── Restore run on page refresh ──────────────────────────────────────────

    async function tryRestoreRun() {
      const savedId = localStorage.getItem("classctl_run_id");
      if (!savedId) return;

      const r = await api("GET", `/runs/${savedId}/state`);
      if (!r || !r.ok) {
        localStorage.removeItem("classctl_run_id");
        return;
      }

      const state = await r.json();
      // Nothing to restore if run already finished
      if (state.phase === "COMPLETED" || state.phase === "ABORTED") {
        localStorage.removeItem("classctl_run_id");
        return;
      }

      activeRunId = savedId;

      // Repopulate accumulated output from server state
      Object.keys(machineOutput).forEach(k => delete machineOutput[k]);
      if (state.output) Object.assign(machineOutput, state.output);
      Object.keys(machineStatus).forEach(k => delete machineStatus[k]);
      Object.entries(state.machines).forEach(([ip, s]) => machineStatus[ip] = s);

      // Find which classroom owns these machine IPs and select it so the
      // main panel is rendered and has a #run-monitor element to attach to
      const runIps = new Set(Object.keys(state.machines));
      const ownerRoom = classrooms.find(c =>
        (c.machines ?? []).some(m => runIps.has(m.ip))
      );
      if (ownerRoom) {
        activeRoom = ownerRoom.name;
        activeRunRoom = ownerRoom.name;
        renderList();
        renderForm(ownerRoom, false);
        // renderForm triggers loadMachines which is async; wait a tick
        await new Promise(r => setTimeout(r, 50));
      }

      // Render monitor and reconnect WebSocket
      renderRunMonitor(state);
      connectRunWs(savedId);

      // Show a banner so the user knows we reconnected
      const msg = document.getElementById("run-start-msg");
      if (msg) {
        msg.className = "msg msg-ok";
        msg.textContent = `Переподключено к запуску ${savedId.slice(0, 8)}…`;
      }
    }

    // Silent-script heartbeat: show elapsed no-output time for RUNNING machines
    setInterval(() => {
      for (const [ip, status] of Object.entries(machineStatus)) {
        if (status !== "RUNNING") continue;
        const key = ip.replace(/\./g, "-");
        const lastEl = document.getElementById(`last-${key}`);
        if (!lastEl) continue;
        const lastTime = lastOutputAt[ip];
        if (!lastTime) continue;
        const silentSecs = Math.floor((Date.now() - lastTime) / 1000);
        if (silentSecs >= 120) {
          const silentMins = Math.floor(silentSecs / 60);
          lastEl.innerHTML = `<span style="color:#bbb;font-style:italic">(нет вывода — ${silentMins} мин)</span>`;
        }
      }
    }, 10000);

    loadClassrooms().then(tryRestoreRun);
  </script>
</body>
</html>
